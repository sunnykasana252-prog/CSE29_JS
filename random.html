<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:300px;
}

h1{
    margin-bottom:20px;
    color:#333;
}

input{
    width:90%;
    padding:10px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 20px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#45a049;
}

#result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>Grade Calculator</h1>

<form>
    <input type="number" id="subjects" placeholder="Enter number of subjects">
</form>

<button onclick="calculateResult()">Calculate Result</button>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
